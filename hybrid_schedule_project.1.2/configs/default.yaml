seed: 42

calendar:
  timezone_default: Europe/Madrid
  bin_minutes: 5
  window_weeks: 16
  min_history_weeks: 24
  topk_templates: 7

splits:
  train_ratio: 0.80
  backtest_weeks: 24
  selector_weeks: 8

models:
  occurrence:
    hidden_size: 128
    num_layers: 1
    dropout: 0.25
    task_embed_dim: 24
    database_embed_dim: 12
    robot_embed_dim: 12
    max_delta: 12
    change_loss_weight: 0.25
    ensemble_weights:
      template: 0.15
      recent: 0.20
      seasonal: 0.20
      neural: 0.45
  temporal:
    hidden_size: 128
    num_layers: 2
    dropout: 0.30
    task_embed_dim: 24
    database_embed_dim: 12
    robot_embed_dim: 12
    topk_day: 4
    topk_time: 6
    day_prior_blend: 0.25
    time_prior_blend: 0.20

training:
  batch_size_occurrence: 32
  batch_size_temporal: 64
  lr_occurrence: 5.0e-4
  lr_temporal: 3.0e-4
  weight_decay: 1.0e-4
  epochs_occurrence: 100
  epochs_temporal: 100
  patience: 15
  min_delta: 0.001
  amp: false
  num_workers: 0
  selector_every: 1
  balanced_sampling: true
  max_grad_norm: 1.0

scheduler:
  movement_penalty: 0.08
  duration_penalty: 0.00
  template_bonus: 0.15
  prohibit_overlap: true
  min_gap_bins: 0
  use_exact_milp: true
  max_solver_seconds: 20
  topk_schedules: 3

uncertainty:
  count_alpha: 0.10

reporting:
  save_plots: true
  save_epoch_jsonl: true
  save_csv: true

regularization:
  input:
    history_dropout_scale: 1.0
    history_noise_scale: 1.0
    feature_dropout_scale: 1.0
    feature_noise_scale: 1.0
  occurrence:
    label_smoothing_scale: 1.0
    target_sigma_scale: 1.0
    shrink_scale: 1.0
    confidence_scale: 1.0
  temporal:
    label_smoothing_scale: 1.0
    time_sigma_scale: 1.0
    prior_scale: 1.0
    anchor_scale: 1.0
    confidence_scale: 1.0
    smoothness_scale: 1.0
