seed: 42

calendar:
  timezone_default: Europe/Madrid
  bin_minutes: 5
  window_weeks: 16
  min_history_weeks: 24
  topk_templates: 5

splits:
  train_ratio: 0.70
  backtest_weeks: 24

models:
  occurrence:
    hidden_size: 128
    num_layers: 1
    dropout: 0.25
    task_embed_dim: 24
    database_embed_dim: 12
    robot_embed_dim: 12
    max_delta: 12
    change_loss_weight: 0.25
  temporal:
    hidden_size: 512
    num_layers: 2
    dropout: 0.3
    task_embed_dim: 24
    database_embed_dim: 12
    robot_embed_dim: 12
    day_radius: 3
    time_radius_bins: 72
    topk_day: 2
    topk_time: 3
    duration_loss_weight: 0.2

training:
  batch_size_occurrence: 32
  batch_size_temporal: 64
  lr_occurrence: 5.0e-4
  lr_temporal: 2.0e-4
  weight_decay: 1.0e-4
  epochs_occurrence: 100
  epochs_temporal: 100
  patience: 7
  lr_patience: 3
  lr_factor: 0.5
  min_delta: 0.002
  amp: false
  num_workers: 0

scheduler:
  movement_penalty: 0.03
  duration_penalty: 0.02
  template_bonus: 0.25
  prohibit_overlap: true
  min_gap_bins: 0
  use_exact_milp: true
  max_milp_variables: 1500
  max_milp_events: 150
  max_solver_seconds: 20

reporting:
  save_plots: true
  save_epoch_jsonl: true
  save_csv: true
